services:
    saver-db:
        image: mariadb:latest
        container_name: luogu-saver-local-db
        restart: unless-stopped
        ports:
            - '127.0.0.1:13306:3306'
        environment:
            MARIADB_ROOT_PASSWORD: '123456'
            MARIADB_DATABASE: luogu_saver
            TZ: Asia/Shanghai
        volumes:
            - ./mysql-data:/var/lib/mysql

    saver-redis:
        image: redis:alpine
        container_name: luogu-saver-local-redis
        restart: unless-stopped
        ports:
            - '127.0.0.1:16379:6379'
        command: redis-server --bind 0.0.0.0 --appendonly yes
        volumes:
            - ./redis-data:/data

    saver-chroma:
        image: chromadb/chroma:latest
        container_name: luogu-saver-local-chroma
        restart: unless-stopped
        ports:
            - '127.0.0.1:18000:8000'
        volumes:
            - ./chroma-data:/chroma/chroma

    saver-meilisearch:
        image: getmeili/meilisearch:latest
        container_name: luogu-saver-local-meilisearch
        restart: unless-stopped
        ports:
            - '127.0.0.1:17700:7700'
        environment:
            MEILI_MASTER_KEY: local_saver_meili_key
            MEILI_NO_ANALYTICS: 'true'
        volumes:
            - ./meili-data:/meili_data
